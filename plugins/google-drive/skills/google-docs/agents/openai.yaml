interface:
  display_name: "Google Docs"
  short_description: "Read, edit, and create Google Docs files."
  icon_small: "./assets/google-docs-small.svg"
  icon_large: "./assets/google-docs.png"
  brand_color: "#1A73E8"
  default_prompt: "Use $google-docs for Google Docs work. For net-new Google Docs, create a local DOCX with [@documents](plugin://documents@openai-primary-runtime) first, then upload and convert it to a native Google Doc. For existing Docs, read the target doc, find the right indexes, and apply precise batch updates with proper formatting."
